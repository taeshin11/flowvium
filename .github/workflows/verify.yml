name: Verify
# 2026-06-04: 자가호스팅(CF→터널→RTX) 전환 후 GitHub Actions 클라우드 러너는 라이브 서버/DB/Ollama 에
#   접근 불가 → verify-all(6 검증, 엔드포인트/DB/보고서 의존)이 매 push 실패해 스팸 이메일 발생.
#   라이브 검증은 자가호스트가 담당: (1) 30분 주기 모니터(check-stall + check-data-quality [A]~[K])
#   (2) git pre-push hook 의 npm run verify (3) cron 후 자동 verify-report.
#   CI 정적 검사(lint/type/pattern audit)는 ci.yml 이 계속 수행. 이 워크플로는 수동 전용으로 보존.
on:
  workflow_dispatch:

jobs:
  verify:
    name: Verify-all (6 검증 병렬)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # 2026-05-31: CI 환경에 data/flowvium.db + reports/ 없음 → schema init + dir 생성
      - name: Init DB schema + reports dir
        run: |
          mkdir -p data reports/verify
          node -e "import('./scripts/lib/db.mjs').then(m => { const db = m.openDb(); console.log('DB schema initialized'); db.close(); })"

      - name: Run verify-all (외부 의존 + 코드 audit 만)
        id: verify
        env:
          # CI 모드 — DB 비어있음, 보고서 없음. critical 결함만 fail 처리.
          VERIFY_CI: '1'
        run: |
          set -o pipefail
          node scripts/verify-all.mjs 2>&1 | tee verify-output.txt
        continue-on-error: true

      - name: Upload verify output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-output
          path: verify-output.txt
          retention-days: 14

      - name: Fail if critical
        if: steps.verify.outcome == 'failure'
        run: |
          echo "❌ verify-all FAIL — 결함 commit 차단."
          echo "→ verify-output artifact 확인 + 로컬 'npm run verify' 로 재현."
          exit 1
